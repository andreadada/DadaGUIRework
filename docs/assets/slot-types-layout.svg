<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-label="DadaGUI slot types layout">
  <rect width="980" height="460" fill="#111827"/>
  <text x="40" y="55" fill="#F9FAFB" font-family="Arial, sans-serif" font-size="30" font-weight="700">Slot typed by layout marker</text>
  <text x="40" y="88" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Only the marker decides behavior: filler, button, storage, content, close.</text>
  <g transform="translate(40,125)">
    <rect x="0" y="0" width="500" height="230" rx="18" fill="#1F2937" stroke="#374151"/>
    <text x="24" y="42" fill="#E5E7EB" font-family="monospace" font-size="23"># # # # # # # # #</text>
    <text x="24" y="82" fill="#E5E7EB" font-family="monospace" font-size="23"># v v v v v v v #</text>
    <text x="24" y="122" fill="#E5E7EB" font-family="monospace" font-size="23"># v v v v v v v #</text>
    <text x="24" y="162" fill="#E5E7EB" font-family="monospace" font-size="23"># v v v v v v v #</text>
    <text x="24" y="202" fill="#E5E7EB" font-family="monospace" font-size="23"># # # I # C # # #</text>
  </g>
  <g transform="translate(600,125)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="300" height="46" rx="10" fill="#374151"/><text x="18" y="30" fill="#F9FAFB" font-size="18"># = FILLER / locked</text>
    <rect x="0" y="60" width="300" height="46" rx="10" fill="#14532D"/><text x="18" y="90" fill="#F9FAFB" font-size="18">v = STORAGE vault slot</text>
    <rect x="0" y="120" width="300" height="46" rx="10" fill="#1D4ED8"/><text x="18" y="150" fill="#F9FAFB" font-size="18">I = DISPLAY info slot</text>
    <rect x="0" y="180" width="300" height="46" rx="10" fill="#7F1D1D"/><text x="18" y="210" fill="#F9FAFB" font-size="18">C = BUTTON close</text>
  </g>
</svg>
