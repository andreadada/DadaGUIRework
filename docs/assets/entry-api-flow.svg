<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="DadaGUI Entry API flow">
  <rect width="980" height="360" fill="#f7f7f5"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111">Entry API flow</text>
  <text x="40" y="76" font-family="Arial, sans-serif" font-size="14" fill="#555">The GUI stays reusable; runtime content is passed only when opening.</text>

  <g font-family="Arial, sans-serif">
    <rect x="40" y="120" width="170" height="86" rx="18" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="65" y="153" font-size="17" font-weight="700" fill="#111">PagedEntryGui</text>
    <text x="65" y="178" font-size="13" fill="#555">layout + markers</text>
    <text x="65" y="196" font-size="13" fill="#555">immutable template</text>

    <path d="M220 163 L295 163" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="310" y="120" width="190" height="86" rx="18" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="334" y="153" font-size="17" font-weight="700" fill="#111">OpenRequest</text>
    <text x="334" y="178" font-size="13" fill="#555">entries + onClose</text>
    <text x="334" y="196" font-size="13" fill="#555">per viewer/session</text>

    <path d="M510 163 L585 163" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="600" y="120" width="150" height="86" rx="18" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="626" y="153" font-size="17" font-weight="700" fill="#111">GuiEntry</text>
    <text x="626" y="178" font-size="13" fill="#555">toSlot()</text>
    <text x="626" y="196" font-size="13" fill="#555">item + click</text>

    <path d="M760 163 L835 163" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="850" y="120" width="90" height="86" rx="18" fill="#111"/>
    <text x="874" y="154" font-size="17" font-weight="700" fill="#fff">Slot</text>
    <text x="869" y="181" font-size="13" fill="#ddd">rendered</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#333">
    <rect x="110" y="254" width="760" height="48" rx="14" fill="#e8efe9" stroke="#8aa58e"/>
    <text x="137" y="284">RecipeEntry, ShopEntry, PlayerEntry and QuestEntry can own their own item rendering and click behavior.</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
  </defs>
</svg>
