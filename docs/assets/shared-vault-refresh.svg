<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Shared vault refresh flow">
  <rect width="980" height="420" fill="#0F172A"/>
  <text x="40" y="55" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">Shared vault</text>
  <text x="40" y="85" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="16">Many viewers, one shared state. A change can refresh every open session.</text>
  <defs><marker id="b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#F8FAFC"/></marker></defs>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="70" y="135" width="185" height="70" rx="14" fill="#1E293B" stroke="#475569"/><text x="103" y="178" fill="#F8FAFC">Viewer A</text>
    <rect x="70" y="250" width="185" height="70" rx="14" fill="#1E293B" stroke="#475569"/><text x="103" y="293" fill="#F8FAFC">Viewer B</text>
    <rect x="392" y="185" width="210" height="85" rx="16" fill="#7C3AED"/><text x="436" y="220" fill="#F8FAFC">Shared GUI</text><text x="421" y="246" fill="#EDE9FE">sharedKey team-vault</text>
    <rect x="735" y="185" width="190" height="85" rx="16" fill="#059669"/><text x="770" y="220" fill="#F8FAFC">Storage</text><text x="764" y="246" fill="#D1FAE5">same container</text>
    <line x1="255" y1="170" x2="392" y2="210" stroke="#F8FAFC" stroke-width="3" marker-end="url(#b)"/>
    <line x1="255" y1="285" x2="392" y2="245" stroke="#F8FAFC" stroke-width="3" marker-end="url(#b)"/>
    <line x1="602" y1="228" x2="735" y2="228" stroke="#F8FAFC" stroke-width="3" marker-end="url(#b)"/>
    <path d="M735 270 C610 365 430 365 255 285" fill="none" stroke="#FBBF24" stroke-width="3" marker-end="url(#b)"/>
    <text x="395" y="355" fill="#FBBF24" font-size="16">refreshAllViewers()</text>
  </g>
</svg>
