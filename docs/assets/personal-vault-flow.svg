<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Personal vault flow">
  <rect width="980" height="420" fill="#FAFAFA"/>
  <text x="40" y="55" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Personal vault</text>
  <text x="40" y="85" fill="#4B5563" font-family="Arial, sans-serif" font-size="16">One GUI definition, one storage container per player.</text>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#111827"/></marker></defs>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="55" y="145" width="210" height="86" rx="16" fill="#111827"/><text x="95" y="180" fill="#F9FAFB">Player Claudio</text><text x="95" y="205" fill="#CBD5E1">opens /dadagui vault</text>
    <rect x="385" y="145" width="210" height="86" rx="16" fill="#2563EB"/><text x="436" y="180" fill="#F9FAFB">GuiSession</text><text x="415" y="205" fill="#DBEAFE">created per viewer</text>
    <rect x="715" y="145" width="210" height="86" rx="16" fill="#16A34A"/><text x="770" y="180" fill="#F9FAFB">Storage</text><text x="750" y="205" fill="#DCFCE7">UUID-based vault</text>
    <line x1="265" y1="188" x2="385" y2="188" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>
    <line x1="595" y1="188" x2="715" y2="188" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>
    <rect x="385" y="285" width="210" height="62" rx="16" fill="#F59E0B"/><text x="420" y="324" fill="#111827">Save on close/quit</text>
    <line x1="820" y1="231" x2="510" y2="285" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>
  </g>
</svg>
